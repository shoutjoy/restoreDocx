<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOCX 데이터 복원 및 추출기</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- JSZip Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <div class="max-w-5xl mx-auto p-6">
        <!-- 헤더 -->
        <header class="mb-8 border-b pb-4">
            <h1 class="text-3xl font-bold text-blue-900 mb-2">DOCX 파일 구조 분석 및 텍스트 복원 도구</h1>
            <p class="text-gray-600">
                손상되거나 깨진 MS Word(.docx) 파일, 혹은 잘못 저장된 텍스트 파일(.txt)의 내부 구조를 분석하고 
                <code class="bg-gray-200 px-1 rounded text-sm text-red-600">word/document.xml</code>에서 본문 데이터를 강제 추출한다.
            </p>
        </header>

        <!-- 파일 업로드 영역 -->
        <div id="drop-zone" class="border-4 border-dashed border-blue-200 rounded-xl p-10 text-center bg-white hover:bg-blue-50 transition-colors cursor-pointer mb-8 relative">
            <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept=".docx,.zip,.txt">
            <svg class="mx-auto h-12 w-12 text-blue-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
            </svg>
            <h3 class="text-lg font-semibold text-gray-700">분석할 파일을 이곳에 드래그하거나 클릭하여 선택한다.</h3>
            <p class="text-sm text-gray-500 mt-2">지원 형식: .docx, .zip, 구조가 노출된 .txt</p>
        </div>

        <!-- 상태 메시지 -->
        <div id="status-message" class="hidden mb-6 p-4 rounded-lg"></div>

        <!-- 결과 영역 (초기 숨김) -->
        <div id="result-area" class="hidden bg-white rounded-xl shadow-sm border overflow-hidden">
            <!-- 탭 메뉴 -->
            <div class="flex border-b bg-gray-50">
                <button class="tab-btn active px-6 py-3 text-sm font-medium text-blue-600 border-b-2 border-blue-600 focus:outline-none" data-target="tab-text">
                    복원된 텍스트
                </button>
                <button class="tab-btn px-6 py-3 text-sm font-medium text-gray-500 hover:text-gray-700 focus:outline-none" data-target="tab-xml">
                    document.xml 원본
                </button>
                <button class="tab-btn px-6 py-3 text-sm font-medium text-gray-500 hover:text-gray-700 focus:outline-none" data-target="tab-structure">
                    파일 내부 구조 (ZIP)
                </button>
            </div>

            <!-- 탭 콘텐츠 -->
            <div class="p-6 h-[500px] overflow-y-auto">
                <!-- 복원된 텍스트 탭 -->
                <div id="tab-text" class="tab-content active">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="text-lg font-semibold">추출된 본문 데이터</h4>
                        <div class="flex space-x-2">
                            <button id="view-new-window-btn" class="px-4 py-2 bg-purple-100 text-purple-700 rounded hover:bg-purple-200 transition text-sm font-medium">새창으로 보기</button>
                            <button id="copy-btn" class="px-4 py-2 bg-blue-100 text-blue-700 rounded hover:bg-blue-200 transition text-sm font-medium">텍스트 복사</button>
                            <button id="download-docx-btn" class="px-4 py-2 bg-green-100 text-green-700 rounded hover:bg-green-200 transition text-sm font-medium">DOCX 다운로드</button>
                        </div>
                    </div>
                    <div id="extracted-text-content" class="bg-gray-50 p-4 rounded border text-gray-800 leading-relaxed font-serif text-lg">
                        <!-- 텍스트 렌더링 영역 -->
                    </div>
                </div>

                <!-- XML 원본 탭 -->
                <div id="tab-xml" class="tab-content">
                    <h4 class="text-lg font-semibold mb-4">word/document.xml 원시 데이터</h4>
                    <pre id="raw-xml-content" class="bg-gray-900 text-green-400 p-4 rounded text-sm font-mono overflow-x-auto">
                        <!-- XML 렌더링 영역 -->
                    </pre>
                </div>

                <!-- 파일 구조 탭 -->
                <div id="tab-structure" class="tab-content">
                    <h4 class="text-lg font-semibold mb-4">내부 디렉터리 및 파일 목록</h4>
                    <ul id="file-structure-list" class="space-y-2 text-sm font-mono">
                        <!-- 파일 구조 렌더링 영역 -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fileInput = document.getElementById('file-input');
            const statusMessage = document.getElementById('status-message');
            const resultArea = document.getElementById('result-area');
            const extractedTextContent = document.getElementById('extracted-text-content');
            const rawXmlContent = document.getElementById('raw-xml-content');
            const fileStructureList = document.getElementById('file-structure-list');
            const copyBtn = document.getElementById('copy-btn');
            const viewNewWindowBtn = document.getElementById('view-new-window-btn');
            const downloadDocxBtn = document.getElementById('download-docx-btn');

            // 탭 로직
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => {
                        b.classList.remove('text-blue-600', 'border-blue-600', 'border-b-2');
                        b.classList.add('text-gray-500');
                    });
                    e.target.classList.add('text-blue-600', 'border-blue-600', 'border-b-2');
                    e.target.classList.remove('text-gray-500');

                    document.querySelectorAll('.tab-content').forEach(content => {
                        content.classList.remove('active');
                    });
                    document.getElementById(e.target.dataset.target).classList.add('active');
                });
            });

            // 클립보드 복사
            copyBtn.addEventListener('click', () => {
                const text = extractedTextContent.innerText;
                if (!text.trim()) {
                    showStatus('복사할 텍스트가 없다.', true);
                    return;
                }
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    const originalText = copyBtn.innerText;
                    copyBtn.innerText = '복사 완료!';
                    copyBtn.classList.replace('bg-blue-100', 'bg-green-100');
                    copyBtn.classList.replace('text-blue-700', 'text-green-700');
                    setTimeout(() => {
                        copyBtn.innerText = originalText;
                        copyBtn.classList.replace('bg-green-100', 'bg-blue-100');
                        copyBtn.classList.replace('text-green-700', 'text-blue-700');
                    }, 2000);
                } catch (err) {
                    showStatus('복사에 실패하였다.', true);
                }
                document.body.removeChild(textarea);
            });

            // 새창으로 보기
            viewNewWindowBtn.addEventListener('click', () => {
                const text = extractedTextContent.innerText;
                if (!text.trim()) {
                    showStatus('새창으로 볼 텍스트가 없다.', true);
                    return;
                }
                const newWindow = window.open('', '_blank');
                newWindow.document.write(`
                    <!DOCTYPE html>
                    <html lang="ko">
                    <head>
                        <meta charset="UTF-8">
                        <title>복원된 텍스트</title>
                        <style>
                            body { font-family: sans-serif, serif; line-height: 1.6; padding: 2rem; max-width: 800px; margin: 0 auto; color: #333; }
                            pre { white-space: pre-wrap; word-wrap: break-word; font-family: inherit; font-size: 1.1rem; }
                        </style>
                    </head>
                    <body>
                        <h2>추출된 텍스트 문서</h2>
                        <hr style="margin-bottom: 2rem;">
                        <pre>${text.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre>
                    </body>
                    </html>
                `);
                newWindow.document.close();
            });

            // DOCX로 다운로드 (JSZip을 이용한 최소 DOCX 구조 생성)
            downloadDocxBtn.addEventListener('click', () => {
                const text = extractedTextContent.innerText;
                if (!text.trim()) {
                    showStatus('다운로드할 텍스트가 없다.', true);
                    return;
                }
                
                showStatus('DOCX 파일을 생성 중이다...', false);
                const zip = new JSZip();
                
                // 1. [Content_Types].xml (문서의 컨텐츠 타입 정의)
                zip.file("[Content_Types].xml", `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
    <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
    <Default Extension="xml" ContentType="application/xml"/>
    <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
</Types>`);
                
                // 2. _rels/.rels (루트 관계 정의)
                zip.file("_rels/.rels", `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
    <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`);
                
                // 3. word/document.xml (실제 본문 내용)
                // 줄바꿈 단위를 단락(<w:p>)으로 변환하고 특수문자 이스케이프 처리
                const paragraphs = text.split('\n').map(p => {
                    const escaped = p.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');
                    return `<w:p><w:r><w:t xml:space="preserve">${escaped}</w:t></w:r></w:p>`;
                }).join('');
                
                zip.file("word/document.xml", `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
    <w:body>${paragraphs}</w:body>
</w:document>`);

                // 압축 및 다운로드 트리거
                zip.generateAsync({type:"blob"}).then(function(content) {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(content);
                    link.download = "extracted_text_restored.docx";
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    showStatus('DOCX 파일 다운로드가 완료되었다.');
                }).catch(err => {
                    showStatus('DOCX 생성 중 오류가 발생하였다.', true);
                });
            });

            function showStatus(message, isError = false, isWarning = false) {
                statusMessage.classList.remove('hidden', 'bg-blue-100', 'text-blue-800', 'bg-red-100', 'text-red-800', 'bg-yellow-100', 'text-yellow-800');
                if (isError) {
                    statusMessage.classList.add('bg-red-100', 'text-red-800');
                } else if (isWarning) {
                    statusMessage.classList.add('bg-yellow-100', 'text-yellow-800');
                } else {
                    statusMessage.classList.add('bg-blue-100', 'text-blue-800');
                }
                statusMessage.innerHTML = `<p class="font-medium">${message}</p>`;
            }

            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                resultArea.classList.add('hidden');
                extractedTextContent.innerHTML = '';
                rawXmlContent.innerText = '';
                fileStructureList.innerHTML = '';

                showStatus('파일을 분석 중이다...', false);

                const reader = new FileReader();

                reader.onload = async function(e) {
                    const arrayBuffer = e.target.result;
                    
                    try {
                        // 1. 정상적인 ZIP(DOCX) 파싱 시도
                        const zip = await JSZip.loadAsync(arrayBuffer);
                        showStatus('정상적인 압축 구조가 확인되었다. 데이터를 추출한다.', false);
                        await processValidZip(zip);
                    } catch (error) {
                        // 2. ZIP 파싱 실패 시: 손상된 텍스트 파일(예: 메모장으로 덮어쓴 파일)로 간주하고 강제 추출 시도
                        console.warn("ZIP 파싱 실패. 텍스트 강제 추출 모드로 전환한다.", error);
                        showStatus('압축 헤더가 손상되었거나 텍스트 형식으로 변환된 파일이다. 패턴 매칭을 통해 강제로 텍스트 추출을 시도한다.', false, true);
                        
                        const textReader = new FileReader();
                        textReader.onload = function(e) {
                            processCorruptedText(e.target.result);
                        };
                        // 손상된 파일은 주로 ANSI나 UTF-8 텍스트로 오염되었을 가능성이 큼
                        textReader.readAsText(file); 
                    }
                };

                reader.readAsArrayBuffer(file);
            });

            // 정상적인 DOCX 구조 처리 함수
            async function processValidZip(zip) {
                let documentXmlFile = null;

                // 파일 구조 시각화
                Object.keys(zip.files).forEach(filename => {
                    const li = document.createElement('li');
                    li.className = "flex items-center space-x-2";
                    const isDir = zip.files[filename].dir;
                    li.innerHTML = `
                        <span class="${isDir ? 'text-yellow-600' : 'text-blue-600'}">
                            ${isDir ? '📁' : '📄'}
                        </span>
                        <span>${filename}</span>
                    `;
                    fileStructureList.appendChild(li);

                    if (filename === 'word/document.xml') {
                        documentXmlFile = zip.files[filename];
                    }
                });

                if (documentXmlFile) {
                    const xmlData = await documentXmlFile.async('string');
                    rawXmlContent.innerText = xmlData;
                    
                    // XML 파싱하여 <w:t> 내부 텍스트만 추출
                    const textContent = extractTextFromXML(xmlData);
                    extractedTextContent.innerHTML = formatExtractedText(textContent);
                    resultArea.classList.remove('hidden');
                    showStatus('텍스트 추출이 성공적으로 완료되었다.');
                } else {
                    showStatus('파일 내부에 word/document.xml 이 존재하지 않는다. 올바른 Word 문서가 아닐 수 있다.', true);
                    resultArea.classList.remove('hidden');
                }
            }

            // XML 파서를 이용한 안전한 텍스트 추출
            function extractTextFromXML(xmlString) {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlString, "text/xml");
                
                // 워드 프로세싱 네임스페이스의 't' 태그(텍스트 태그) 탐색
                const textNodes = xmlDoc.getElementsByTagNameNS("http://schemas.openxmlformats.org/wordprocessingml/2006/main", "t");
                
                let extracted = [];
                // 만약 네임스페이스 처리가 실패한다면 일반 태그 이름으로 백업 탐색
                const nodes = textNodes.length > 0 ? textNodes : xmlDoc.getElementsByTagName("w:t");

                for (let i = 0; i < nodes.length; i++) {
                    extracted.push(nodes[i].textContent);
                }
                
                // 단락 구분을 위해 <w:p> 태그 기준으로 줄바꿈 처리를 하는 것이 이상적이나, 
                // 단순화를 위해 텍스트 배열을 반환하고 후처리함.
                
                // 개선된 추출 방식: <w:p> (단락) 단위로 순회하여 줄바꿈 적용
                let formattedText = "";
                const paragraphs = xmlDoc.getElementsByTagNameNS("http://schemas.openxmlformats.org/wordprocessingml/2006/main", "p");
                const pNodes = paragraphs.length > 0 ? paragraphs : xmlDoc.getElementsByTagName("w:p");

                for (let i = 0; i < pNodes.length; i++) {
                    let pText = "";
                    const tNodes = pNodes[i].getElementsByTagNameNS("http://schemas.openxmlformats.org/wordprocessingml/2006/main", "t");
                    const tTags = tNodes.length > 0 ? tNodes : pNodes[i].getElementsByTagName("w:t");
                    
                    for (let j = 0; j < tTags.length; j++) {
                        pText += tTags[j].textContent;
                    }
                    if (pText.trim().length > 0) {
                        formattedText += pText + "\n";
                    }
                }

                return formattedText || extracted.join("");
            }

            // 손상된 텍스트 파일(ZIP 구조 파괴)에서 정규표현식으로 강제 추출
            function processCorruptedText(rawText) {
                rawXmlContent.innerText = rawText.substring(0, 10000) + "\n\n... (데이터가 너무 길어 10000자까지만 표시함) ...";
                
                fileStructureList.innerHTML = `<li class="text-red-500">압축 헤더 손상으로 인해 디렉터리 구조를 분석할 수 없다.</li>`;

                // 정규표현식을 이용하여 <w:t> 와 </w:t> 사이의 데이터 강제 탐색
                // 정규식: <w:t> 또는 <w:t xml:space="preserve"> 안의 텍스트 매칭
                const regex = /<w:t[^>]*>([\s\S]*?)<\/w:t>/g;
                let match;
                let extracted = [];

                while ((match = regex.exec(rawText)) !== null) {
                    // XML 엔티티(&lt;, &amp; 등) 임시 디코딩
                    let text = match[1]
                        .replace(/&amp;/g, '&')
                        .replace(/&lt;/g, '<')
                        .replace(/&gt;/g, '>')
                        .replace(/&quot;/g, '"');
                    extracted.push(text);
                }

                if (extracted.length > 0) {
                    // 강제 추출 시에는 단락(<w:p>) 구조가 파괴되어 있을 수 있으므로 단순히 이어 붙인다.
                    // 보기 좋게 하기 위해 문장 부호 뒤에 임의의 줄바꿈을 추가한다.
                    let textContent = extracted.join("");
                    textContent = textContent.replace(/(\. |다\.)/g, "$1\n"); // 임시 줄바꿈 포매팅
                    
                    extractedTextContent.innerHTML = formatExtractedText(textContent);
                    resultArea.classList.remove('hidden');
                } else {
                    // 태그조차 없는 경우 (완전한 텍스트 덤프)
                    extractedTextContent.innerHTML = formatExtractedText(rawText);
                    resultArea.classList.remove('hidden');
                    showStatus('XML 구조를 찾을 수 없어 원시 텍스트를 그대로 출력하였다.', true);
                }
            }

            // 텍스트를 HTML에 맞게 포매팅
            function formatExtractedText(text) {
                if (!text) return "<p class='text-gray-400 italic'>추출된 텍스트가 없다.</p>";
                return text.split('\n').map(line => {
                    return line.trim() ? `<p class="mb-2">${line}</p>` : `<br>`;
                }).join('');
            }
        });
    </script>
</body>
</html>
